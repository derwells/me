name: Ralph Loops

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:
    inputs:
      loop:
        description: "Run a specific loop name, or 'all' for all active loops"
        required: false
        default: "all"

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_loops: ${{ steps.discover.outputs.has_loops }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install ralph
        run: cd ralph && uv sync --locked

      - name: Type check and test
        run: cd ralph && uv run pyright && uv run pytest -v

      - name: Discover active loops
        id: discover
        run: |
          if [ "${{ github.event.inputs.loop || 'all' }}" = "all" ]; then
            cd ralph && uv run ralph discover --output github-matrix
          else
            # Manual override: run specific loop regardless of status
            echo 'matrix={"loop":["${{ github.event.inputs.loop }}"]}' >> "$GITHUB_OUTPUT"
            echo "has_loops=true" >> "$GITHUB_OUTPUT"
          fi

  run-loop:
    needs: discover
    if: needs.discover.outputs.has_loops == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name "ralph-loop[bot]"
          git config user.email "ralph-loop[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install ralph
        run: cd ralph && uv sync --locked

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run one iteration
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: cd ralph && uv run ralph run ${{ matrix.loop }}

      - name: Commit results
        run: |
          cd "loops/${{ matrix.loop }}"
          git add -A
          git diff --cached --quiet || git commit -m "loop(${{ matrix.loop }}): iteration"
          git pull --rebase origin "${{ github.ref_name }}"
          git push
